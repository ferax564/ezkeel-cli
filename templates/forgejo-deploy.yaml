# Forgejo Actions workflow for deploying with ezkeel.
# Generated by: ezkeel ci setup
#
# Prerequisites:
#   1. SSH private key stored as a Forgejo secret named SSH_PRIVATE_KEY
#   2. ezkeel-agent installed on the target server
#   3. Server configured via: ezkeel server add --host <ip> --domain <domain>

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ezkeel
        run: |
          curl -fsSL https://ezkeel.com/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure ezkeel
        run: |
          ezkeel server add \
            --host "${{ vars.DEPLOY_HOST }}" \
            --domain "${{ vars.DEPLOY_DOMAIN }}" \
            --key ~/.ssh/deploy_key \
            --name deploy-target

      - name: Deploy
        run: ezkeel up --server deploy-target --plain
