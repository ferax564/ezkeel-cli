name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    env:
      DISPATCH_TAG: ${{ github.event.inputs.tag }}
      REF_NAME: ${{ github.ref_name }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve tag
        id: tag
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG_NAME="$DISPATCH_TAG"
          else
            TAG_NAME="$REF_NAME"
          fi
          printf 'name=%s\n' "$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build ezkeel
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          TAG_NAME: ${{ steps.tag.outputs.name }}
          MATRIX_GOOS: ${{ matrix.goos }}
          MATRIX_GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build \
            -ldflags="-s -w -X github.com/ferax564/ezkeel-cli/internal/version.Version=${TAG_NAME}" \
            -o "dist/ezkeel-${MATRIX_GOOS}-${MATRIX_GOARCH}" \
            ./cmd/ezkeel
          go build -ldflags="-s -w" \
            -o "dist/ezkeel-agent-${MATRIX_GOOS}-${MATRIX_GOARCH}" \
            ./cmd/ezkeel-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DISPATCH_TAG: ${{ github.event.inputs.tag }}
      REF_NAME: ${{ github.ref_name }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG_NAME="$DISPATCH_TAG"
          else
            TAG_NAME="$REF_NAME"
          fi
          printf 'name=%s\n' "$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "ezkeel $TAG_NAME" \
            --generate-notes \
            dist/*
