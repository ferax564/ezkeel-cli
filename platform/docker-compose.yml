services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ezkeel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ezkeel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezkeel"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=ezkeel
      - FORGEJO__database__USER=ezkeel
      - FORGEJO__database__PASSWD=${POSTGRES_PASSWORD}
      - FORGEJO__server__ROOT_URL=https://${FORGEJO_DOMAIN}
      - FORGEJO__server__DOMAIN=${FORGEJO_DOMAIN}
      - FORGEJO__actions__ENABLED=true
      - FORGEJO__service__DISABLE_REGISTRATION=true
    volumes:
      - forgejo_data:/data
    restart: unless-stopped

  infisical:
    image: infisical/infisical:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION_URI=postgresql://ezkeel:${POSTGRES_PASSWORD}@postgres:5432/ezkeel
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}
      - AUTH_SECRET=${INFISICAL_AUTH_SECRET}
      - SITE_URL=https://${INFISICAL_DOMAIN}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - ./pages:/srv/pages
    environment:
      - FORGEJO_DOMAIN=${FORGEJO_DOMAIN}
      - INFISICAL_DOMAIN=${INFISICAL_DOMAIN}
    restart: unless-stopped

  runner:
    image: code.forgejo.org/forgejo/runner:3.5.1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        forgejo-runner register --no-interactive \
          --instance "$${FORGEJO_INSTANCE_URL}" \
          --token "$${FORGEJO_RUNNER_TOKEN}" \
          --name ezkeel-runner \
          --labels "docker:docker://node:20" 2>/dev/null || true
        forgejo-runner daemon
    user: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_data:/data
    environment:
      - FORGEJO_RUNNER_TOKEN=${RUNNER_TOKEN}
      - FORGEJO_INSTANCE_URL=https://${FORGEJO_DOMAIN}
    depends_on:
      - forgejo
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  forgejo_data:
  caddy_data:
  runner_data:
